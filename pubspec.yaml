name: smart_task_timetable_planner
description: A smart planner for managing university tasks and study timetables.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.3+1
  path: ^1.9.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  crypto: ^3.0.3

  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^4.1.1

  intl: ^0.19.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  mocktail: ^1.0.3

flutter:
  uses-material-design: true